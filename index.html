<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BottomNav — demo</title>
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/scale.css" />
<link rel="stylesheet" href="styles/fonts.css" />
<link rel="stylesheet" href="styles/glass.css" />
<link rel="stylesheet" href="components/header/header.css" />
<link rel="stylesheet" href="components/bottom-nav/bottom-nav.css" />
<style>
  * { box-sizing: border-box; }
  html, body {
    min-height: 100%;
  }
  body {
    margin: 0;
    min-height: 100svh;
    background: var(--color-bg-gradient);
    display: flex;
    flex-direction: column;
    font-family: var(--font-body);
    overflow-x: hidden;
  }
  .page-shell {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 100svh;
    padding: var(--space-8) var(--space-8) var(--space-5);
    background: var(--color-bg-gradient);
  }
  .page-header {
    position: fixed;
    z-index: 10;
    top: 0;
    left: 0;
    width: 100%;
    /* slightly raised: use smaller top inset so header sits closer to the top edge */
    padding: max(var(--space-6), env(safe-area-inset-top)) var(--space-8) 0;
  }
  .hero-copy {
    padding: 2rem var(--space-8) 0;
    text-align: center;
    color: var(--color-white);
  }

  .hero-copy h1 {
    margin: 0;
    font-family: var(--font-heading);
    font-size: var(--font-size-xl);
    line-height: var(--line-height-default);
    font-weight: 400;
  }

  .hero-lead {
    margin: var(--space-2) 0 0;
    font-family: var(--font-body);
    font-size: 1rem;
    line-height: 1.3;
    font-weight: var(--font-weight-semibold);
  }

  .demo-note {
    color: rgba(255,255,255,0.9);
    text-align: center;
    padding: var(--space-5);
    font-size: 0.875rem; /* 14px при 390px, дальше растёт вместе с интерфейсом */
    margin: auto 0;
  }
  .page-bottom {
    position: fixed;
    z-index: 10;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: var(--space-5);
    /* slightly lowered: reduce bottom inset so footer sits closer to the bottom edge */
    padding-bottom: max(var(--space-6), env(safe-area-inset-bottom));
  }
</style>
</head>
<body>
  <div class="page-shell">
    <div class="page-header">
      <div id="header-root"></div>
    </div>

    <section class="hero-copy">
      <h1>Вы искали продуктового дизайнера</h1>
      <p class="hero-lead">И вы его нашли</p>
    </section>

    <p class="demo-note">Демо-страница для изолированной проверки BottomNav<br/>на фирменном градиенте — так виден стеклянный эффект</p>

    <div class="page-bottom">
      <div id="bottom-nav-root"></div>
    </div>
  </div>

  <script type="module">
    import { initHeader } from "./components/header/header.js";
    import { initBottomNav } from "./components/bottom-nav/bottom-nav.js";

    async function mountComponent(rootId, fragmentPath, init) {
      const root = document.getElementById(rootId);
      if (!root) return;

      const response = await fetch(fragmentPath);
      if (!response.ok) {
        throw new Error(`Failed to load ${fragmentPath}`);
      }

      root.innerHTML = await response.text();
      init(root);
    }

    mountComponent("header-root", "components/header/header.html", initHeader);
    mountComponent("bottom-nav-root", "components/bottom-nav/bottom-nav.html", initBottomNav);
  </script>
</body>
</html>
