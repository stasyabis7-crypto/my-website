<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BottomNav — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" />
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/scale.css" />
<link rel="stylesheet" href="styles/fonts.css" />
<link rel="stylesheet" href="styles/glass.css" />
<link rel="stylesheet" href="components/header/header.css" />
<link rel="stylesheet" href="components/bottom-nav/bottom-nav.css" />
<link rel="stylesheet" href="components/project-card/project-card.css" />
<link rel="stylesheet" href="components/slider/slider.css" />
<link rel="stylesheet" href="components/about/about.css" />
<link rel="stylesheet" href="components/popular/popular-card.css" />
<link rel="stylesheet" href="components/popular/popular.css" />
<style>
  * { box-sizing: border-box; }
  html, body {
    min-height: 100%;
  }
  body {
    margin: 0;
    min-height: 100svh;
    background: var(--color-bg-gradient);
    display: flex;
    flex-direction: column;
    font-family: var(--font-body);
    overflow-x: hidden;
  }
  .page-shell {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 100svh;
    padding: calc(max(var(--space-6), env(safe-area-inset-top)) + 5rem) var(--space-8) calc(max(var(--space-6), env(safe-area-inset-bottom)) + 6.5rem);
    /* Плоский базовый цвет на весь сайт — градиент теперь только у
       .hero-block (см. ниже), а не растянут на всю (очень длинную из-за
       блока "Обо мне") страницу. */
    background: var(--color-blue);
  }
  .hero-block {
    /* full-bleed: градиент первого блока — только до низа карточек
       слайдера, во всю ширину экрана (та же техника margin/padding, что
       у .about-block и .about-block__photo-wrap). */
    margin-inline: calc(-1 * var(--space-8));
    padding-inline: var(--space-8);
    background: var(--color-bg-gradient);
  }
  .page-header {
    position: fixed;
    z-index: 10;
    top: 0;
    left: 0;
    width: 100%;
    /* slightly raised: use smaller top inset so header sits closer to the top edge */
    padding: max(var(--space-6), env(safe-area-inset-top)) var(--space-8) 0;
  }
  .hero-copy {
    padding: 2rem var(--space-8) 0;
    text-align: center;
    color: var(--color-white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .project-slider-section {
    margin-top: var(--space-7); /* 32px от подзаголовка */
    margin-bottom: 1.25rem; /* уменьшенный запас фона 1 блока под карточками */
  }

  .hero-copy h1 {
    margin: 0;
    font-family: var(--font-heading);
    font-size: var(--font-size-xl);
    line-height: var(--line-height-default);
    font-weight: 400;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    max-width: min(100%, 22rem);
    width: auto;
  }

  .hero-line {
    display: block;
    white-space: nowrap;
  }

  .hero-lead {
    margin: var(--space-2) 0 0;
    font-family: var(--font-body);
    font-size: 1rem;
    line-height: 1.3;
    font-weight: var(--font-weight-regular);
  }

  .demo-note {
    color: rgba(255,255,255,0.9);
    text-align: center;
    padding: var(--space-5);
    font-size: 0.875rem; /* 14px при 390px, дальше растёт вместе с интерфейсом */
    margin: auto 0;
  }
  .page-bottom {
    position: fixed;
    z-index: 10;
    bottom: 0;
    left: 0;
    width: 100%;
    /* 16px снизу, 6px по бокам — и полная панель, и схлопнутые кнопки
       (.bottom-nav-collapsed) сидят внутри этого паддинга, так что обе
       требуемые дистанции соблюдаются сами собой. */
    padding: 0 var(--space-2) var(--space-5);
    padding-bottom: max(var(--space-5), env(safe-area-inset-bottom));
  }

  /*
    Брейкпоинты планшет/десктоп (800+). Мобильный диапазон (390–800,
    см. scale.css) не трогаем — правила ниже активны только от 800px.

    Шрифты дальше отдельно не переопределяем: html font-size уже
    зафиксирован в scale.css на отметке 950px (и сам рост смягчён), так
    что и заголовок, и остальная типографика просто используют уже
    застывшее к 950px значение — без отдельного фиксированного размера.

    Между зонами (800→1100, 1101→1440) размеры карточек и часть отступов
    "едут" плавно (см. calc/clamp в project-card.css) от значения на старте
    зоны к значению на старте следующей. От 1441px всё фиксируется.
  */

  /* Зона 1: планшет (800–1100). Хедер/футер остаются закреплены
     сверху/снизу, как на мобильном — меняются только отступы вокруг
     заголовка и запас фона под карточками. */
  @media (min-width: 800px) {
    .hero-copy {
      padding-top: 40px; /* от хедера до заголовка */
    }

    .project-slider-section {
      margin-top: 40px; /* от подзаголовка до карточек — одинаково во всех зонах */
      margin-bottom: 0px; /* уменьшенный запас фона 1 блока — фон виден под карточками */
    }
  }

  /* Зоны 2–3: десктоп (1101+) — хедер и футер переезжают в верхние углы
     и остаются закреплены там при скролле. */
  @media (min-width: 1101px) {
    .page-header {
      top: 10px;
      left: 10px;
      width: auto;
      padding: 0;
    }

    .page-bottom {
      top: 10px;
      right: 10px;
      bottom: auto;
      left: auto;
      width: auto;
      padding: 0;
    }

    /* Одинаковая высота хедера и футера — сами компоненты уже
       центрируют контент по вертикали через align-items:center. */
    .header,
    .bottom-nav {
      height: 4.25rem; /* = высота .header: аватар 3.5rem + паддинг 0.375rem×2 */
    }

    .hero-copy {
      /* теперь отсчитывается от строки хедер/футер, а не от верха экрана */
      padding-top: 16px;
    }

    .hero-copy h1 {
      /* размер шрифта не переопределяем — используем уже застывшее к
         950px значение (см. scale.css); снимаем только мобильный
         max-width, чтобы контейнер не сжимал заголовок на широком экране */
      max-width: none;
    }

    .project-slider-section {
      /* карточки остаются на месте — сокращаем только расстояние от их
         конца до конца фона 1 блока, это двигает вверх только "Обо мне" */
      margin-bottom: -200px;
    }
  }
</style>
</head>
<body>
  <div class="page-shell">
    <div class="page-header">
      <div id="header-root"></div>
    </div>

    <div class="hero-block">
      <section class="hero-copy">
        <h1>
          <span class="hero-line">Вы искали</span>
          <span class="hero-line">продуктового</span>
          <span class="hero-line">дизайнера</span>
        </h1>
        <p class="hero-lead">И вы его нашли</p>
      </section>
    </div>

    <div class="page-bottom">
      <div id="bottom-nav-root"></div>
    </div>
  </div>

  <script type="module">
    import { initHeader } from "./components/header/header.js";
    import { initBottomNav } from "./components/bottom-nav/bottom-nav.js";
    import { initTypography } from "./components/typography/typography.js";

    // Следит за всем деревом страницы, включая контент, который компоненты
    // ниже подгружают асинхронно — запускаем один раз, до монтирования.
    initTypography(document.body);

    async function mountComponent(rootId, fragmentPath, init) {
      const root = document.getElementById(rootId);
      if (!root) return;

      const response = await fetch(fragmentPath);
      if (!response.ok) {
        throw new Error(`Failed to load ${fragmentPath}`);
      }

      root.innerHTML = await response.text();
      init(root);
    }

    mountComponent("header-root", "components/header/header.html", initHeader);
    mountComponent("bottom-nav-root", "components/bottom-nav/bottom-nav.html", initBottomNav);

    import { initProjectSlider } from "./components/slider/slider.js";
    const sliderSection = document.createElement('section');
    sliderSection.className = 'project-slider-section';
    sliderSection.id = 'project-slider-root';
    // Кладём карточки внутрь .hero-block — так градиент первого блока
    // тянется ровно до низа карточек, а не на весь (очень длинный) сайт.
    document.querySelector('.hero-block').appendChild(sliderSection);
    mountComponent("project-slider-root", "components/slider/slider.html", initProjectSlider);

    import { initAbout } from "./components/about/about.js";
    const aboutRoot = document.createElement('div');
    aboutRoot.id = 'about-root';
    document.querySelector('.page-shell').insertBefore(aboutRoot, document.querySelector('.page-bottom'));
    mountComponent("about-root", "components/about/about.html", initAbout);

    import { initPopular } from "./components/popular/popular.js";
    const popularRoot = document.createElement('div');
    popularRoot.id = 'popular-root';
    document.querySelector('.page-shell').insertBefore(popularRoot, document.querySelector('.page-bottom'));
    mountComponent("popular-root", "components/popular/popular.html", initPopular);
  </script>
</body>
</html>
