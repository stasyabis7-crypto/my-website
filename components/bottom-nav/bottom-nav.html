<!-- Компонент BottomNav. Фрагмент, вставляется в страницу как есть. -->
<div class="bottom-nav-wrap" data-nav-state="expanded">
<nav class="bottom-nav glass-surface" aria-label="Основная навигация">
  <button
    class="bottom-nav__item"
    type="button"
    data-state="active"
    data-nav-target="main"
    aria-current="page"
  >
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M2.5 10.9384C2.5 9.71422 3.06058 8.55744 4.02142 7.79888L9.52142 3.45677C10.9747 2.30948 13.0253 2.30948 14.4786 3.45677L19.9786 7.79888C20.9394 8.55744 21.5 9.71422 21.5 10.9384V17.5C21.5 19.7091 19.7091 21.5 17.5 21.5H16C15.4477 21.5 15 21.0523 15 20.5V17.5C15 16.3954 14.1046 15.5 13 15.5H11C9.89543 15.5 9 16.3954 9 17.5V20.5C9 21.0523 8.55228 21.5 8 21.5H6.5C4.29086 21.5 2.5 19.7091 2.5 17.5L2.5 10.9384Z" stroke-width="2"/>
    </svg>
    <span class="bottom-nav__label">Основное</span>
  </button>

  <button
    class="bottom-nav__item"
    type="button"
    data-state="default"
    data-nav-target="all-works"
  >
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g clip-path="url(#star-clip)">
        <path d="M12.0002 2L15.1037 8.72839L22.4618 9.60081L17.0218 14.6316L18.4658 21.8992L12.0002 18.28L5.53456 21.8992L6.97862 14.6316L1.53857 9.60081L8.89669 8.72839L12.0002 2Z" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <defs>
        <clipPath id="star-clip">
          <rect width="24" height="24" fill="white"/>
        </clipPath>
      </defs>
    </svg>
    <span class="bottom-nav__label">Все работы</span>
  </button>

  <button
    class="bottom-nav__item"
    type="button"
    data-state="default"
    data-nav-target="misc"
  >
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M2 10.0005C2 7.04238 4.55409 4.73096 7.49752 5.0253L11.403 5.41585C11.8 5.45555 12.2 5.45555 12.597 5.41585L16.5025 5.0253C19.4459 4.73096 22 7.04238 22 10.0005V16C22 19.5932 17.3041 20.9552 15.3815 17.9196C14.0112 15.7559 10.8803 15.6836 9.4116 17.7818L9.12736 18.1878C6.93073 21.3259 2 19.7716 2 15.9411V10.0005Z" stroke-width="2"/>
      <circle cx="17.9997" cy="9.97554" r="1.3" fill="black"/>
      <circle cx="15.9998" cy="12.9756" r="1.2" fill="black"/>
      <path d="M8 13.4756L8 9.47559" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6 11.4756H10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="bottom-nav__label">Разное</span>
  </button>

  <button
    class="bottom-nav__item"
    type="button"
    data-state="default"
    data-nav-target="about"
  >
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M19 21C19 17.134 15.866 14 12 14C8.13401 14 5 17.134 5 21M12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7C16 9.20914 14.2091 11 12 11Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="bottom-nav__label">Обо мне</span>
  </button>
</nav>

  <!-- Схлопнутое состояние (моб./планшет, см. bottom-nav.js) — две
       стеклянные круглые кнопки вместо полной панели. -->
  <div class="bottom-nav-collapsed">
    <button
      class="bottom-nav-collapsed__btn glass-surface"
      type="button"
      data-nav-action="menu"
      aria-label="Открыть меню"
      aria-expanded="false"
    >
      <svg class="bottom-nav-collapsed__icon" data-icon="menu" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 6H20M4 12H14M4 18H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="bottom-nav-collapsed__icon" data-icon="close" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button
      class="bottom-nav-collapsed__btn glass-surface"
      type="button"
      data-nav-action="top"
      aria-label="Наверх, к началу страницы"
    >
      <svg class="bottom-nav-collapsed__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17 14L12 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 9L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>
