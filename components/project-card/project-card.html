<!-- Project card component -->
<article class="project-card glass-surface" data-project="${id}">
  <div class="project-card__image-wrap">
    <img class="project-card__image" src="${image}" alt="${title}" />
    ${logo ? `<img class="project-card__logo" src="${logo}" alt="${companyAlt}" />` : ``}
  </div>

  <div class="project-card__body">
    <h2 class="project-card__title">${title}</h2>
    <a class="project-card__action" href="${href}" aria-label="Открыть проект ${title}">
      <span class="project-card__action-label">Перейти</span>
      <svg class="project-card__action-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M7 17L17 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 7H17V17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</article>
